services:
  - type: web
    name: dynasty-manager
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: DYNASTY_DB
        value: /data/dynasty.db
    disk:
      name: fantasy-data
      mountPath: /data
      sizeGB: 1
