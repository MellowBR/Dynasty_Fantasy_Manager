{# M13/O1 — Partial reutilizável: modal de detalhe de trade clicável.
   Usado em salary_history.html e player_detail.html.
   Dependência: a página host deve expor função escapeHtml(s) no escopo. #}

<div id="trade-detail-modal" class="modal" style="display:none">
  <div class="modal-overlay" onclick="closeTradeDetail()"></div>
  <div class="modal-box">
    <h2 id="trade-detail-title">Detalhe da Trade</h2>
    <div id="trade-detail-content"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeTradeDetail()">Fechar</button>
    </div>
  </div>
</div>

<style>
.trade-detail-section {
  margin-top: .75rem;
}
.trade-detail-section-title {
  font-size: .78rem;
  color: var(--text-dim, #888);
  text-transform: uppercase;
  letter-spacing: .05em;
  margin-bottom: .3rem;
}
.trade-detail-asset {
  padding: .25rem 0;
  font-size: .9rem;
}
.trade-detail-team-header {
  font-weight: 600;
  margin-top: .6rem;
  margin-bottom: .3rem;
  padding-bottom: .25rem;
  border-bottom: 1px solid rgba(255,255,255,.08);
}
</style>

<script>
function openTradeDetail(txId) {
  const modal = document.getElementById('trade-detail-modal');
  const content = document.getElementById('trade-detail-content');
  const title = document.getElementById('trade-detail-title');
  title.textContent = 'Carregando...';
  content.innerHTML = '<p class="text-dim">Buscando detalhes da trade...</p>';
  modal.style.display = 'flex';

  fetch(`/api/trades/by_tx/${encodeURIComponent(txId)}`)
    .then(r => r.json())
    .then(d => {
      if (d.error) {
        title.textContent = 'Trade não encontrada';
        content.innerHTML = `<p class="text-dim">${escapeHtml(d.error)}</p>`;
        return;
      }
      title.textContent = `${d.team_a} ⇄ ${d.team_b}`;
      let html = `<p class="text-dim small-text">${escapeHtml(d.trade_date || '—')}</p>`;
      const teams = Object.keys(d.assets_by_team || {});
      if (teams.length === 0) {
        html += '<p class="text-dim">Sem ativos rastreáveis nessa trade.</p>';
      } else {
        for (const team of teams) {
          const assets = d.assets_by_team[team] || [];
          html += `<div class="trade-detail-team-header">📥 ${escapeHtml(team)} recebeu:</div>`;
          html += '<div class="trade-detail-section">';
          for (const a of assets) {
            const assetHtml = a.player_id
              ? renderPlayerNameLink({id: a.player_id, name: a.asset})
              : escapeHtml(a.asset);
            html += `<div class="trade-detail-asset">· ${assetHtml} <span class="text-dim small-text">(de ${escapeHtml(a.from)})</span></div>`;
          }
          html += '</div>';
        }
      }
      content.innerHTML = html;
    })
    .catch(e => {
      title.textContent = 'Erro';
      content.innerHTML = `<p class="text-danger">Erro ao carregar: ${escapeHtml(String(e))}</p>`;
    });
}

function closeTradeDetail() {
  document.getElementById('trade-detail-modal').style.display = 'none';
}
</script>
